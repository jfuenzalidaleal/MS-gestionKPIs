spring.application.name=microservicio_kpi
# Conexiůn a Base de Datos Local
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# 'update' crearŠ las tablas automŠticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Comentario equipo: Usamos variables de entorno para no dejar
# las contraseŮas expuestas en el cůdigo fuente.

# Configuraciůn del Circuit Breaker
resilience4j.circuitbreaker.instances.kpiService.sliding-window-size=5
resilience4j.circuitbreaker.instances.kpiService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kpiService.wait-duration-in-open-state=10000
